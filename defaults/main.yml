---
# Role Defaults
ai_tasks:
  - { enabled: false, name: 'install_dependencies' }
  - { enabled: true, name: 'install_ollama' }
  - { enabled: true, name: 'configure_ollama' }
  - { enabled: true, name: 'install_opencode' }
  - { enabled: true, name: 'configure_opencode' }
  - { enabled: false, name: 'cleanup_opencode' }
  - { enabled: true, name: 'install_openspec' }
  - { enabled: true, name: 'install_speckit' }
  - { enabled: false, name: 'install_cursor' }

# User directories
ai_user_home_dir: "{{ ansible_facts['user_dir'] }}"
ai_user_scripts_dir: "{{ ai_user_home_dir }}/bin"

# AI Agent wrapper script
ai_agent_script_name: skynet

# AI Tools Versions
# For npm packages (OpenCode, OpenSPEC): set to "latest" for automatic updates
# on each run, or pin to a specific version (e.g., "1.2.3").
ai_opencode_version: latest
ai_openspec_version: latest
# For SpecKit: set to "latest" to auto-detect the newest GitHub release,
# or pin to a release tag (e.g., "v0.4.4").
# Available releases: https://github.com/github/spec-kit/releases
ai_speckit_version: latest

# Ollama settings
# Install method: "auto" detects from OS family (RedHat/Debian -> package,
# other -> script). Override with "package" or "script".
ai_ollama_install_method: auto

# SELinux: deploy a confined policy for the Ollama daemon.
# Required on SELinux-enforcing systems (e.g., Fedora) where the Ollama
# package does not ship its own policy. Without it, Ollama runs as init_t
# and is denied network access for model pulls and API binding.
# Disabled by default -- enable only on SELinux-enforcing hosts.
# See files/selinux/ollama.te for the full policy and permission rationale.
ai_ollama_selinux_policy: false

# Service lifecycle: "started" runs now, "stopped" installs only.
# "enabled" controls whether the service persists across reboots.
ai_ollama_service_enabled: false
ai_ollama_service_state: started

# Curated model list: override in playbook to enable/disable models.
# Only enabled models are pulled during configure_ollama.
ai_ollama_models:
  - { enabled: true, name: 'qwen3:8b' }
  - { enabled: false, name: 'qwen3:32b' }
  - { enabled: false, name: 'devstral' }
  - { enabled: false, name: 'qwen3-coder:a3b' }
  - { enabled: false, name: 'llama3.1:8b' }

# AI Model settings
# Defaults to Ollama for a zero-cost out-of-box experience.
# Override to use paid providers (e.g., "google-vertex-anthropic/claude-opus-4-6@default").
ai_model: "ollama/qwen3:8b"
ai_small_model: "ollama/qwen3:8b"

# GCP settings for AI model access
# Only relevant when google-vertex-anthropic is in ai_opencode_providers.
# Harmlessly ignored otherwise.
ai_gcp_project: "your-gcp-project"
ai_vertex_location: "us-central1"

# OpenCode provider configuration
# Models from Ollama visible in OpenCode (independent of the pull list above).
# Maps Ollama model names to their display configuration.
ai_opencode_ollama_models:
  qwen3:8b:
    name: "Qwen 3 8B (local)"

# Full provider catalog for OpenCode. This dict is rendered directly into the
# "provider" block of opencode.json. Add, remove, or customize providers here.
# The Ollama entry uses a Jinja reference to ai_opencode_ollama_models, which
# Ansible resolves at template rendering time.
ai_opencode_providers:
  ollama:
    npm: "@ai-sdk/openai-compatible"
    name: "Ollama (local)"
    options:
      baseURL: "http://localhost:11434/v1"
    models: "{{ ai_opencode_ollama_models }}"
  google-vertex-anthropic:
    models:
      claude-opus-4-6@default:
        options:
          thinking:
            type: enabled
            budgetTokens: 32000

# Providers that OpenCode should not auto-detect. Empty list means no providers
# are disabled. Override to block specific providers (e.g., ["openai", "gemini"]).
ai_opencode_disabled_providers: []

# OpenCode configuration
ai_opencode_config_dir: "{{ ai_user_home_dir }}/.config/opencode"
ai_opencode_config_file: "{{ ai_opencode_config_dir }}/opencode.json"

# OpenCode instruction files
# The ~/... path is resolved from the user's home directory (always loaded).
# Relative paths are resolved from the repo root (loaded if the file exists).
# Order matters: later entries override earlier ones on conflicting rules.
ai_opencode_instructions:
  - "~/.config/opencode/commit.md"
  - "~/.config/opencode/coding-standards.md"
  - ".specify/memory/constitution.md"
  - "AGENTS.md"
  - "CLAUDE.md"

# Trusted GitHub organizations for command security guards
# Commands like checkout_pr and review_pr will verify the repo owner
# against this list before proceeding. Empty list means always ask.
ai_trusted_github_orgs: ['marcusburghardt', 'complytime']

# OpenCode commands
# Built-in commands from files/commands/ are auto-discovered and deployed.
# Disable specific built-ins by name (without .md extension):
ai_opencode_commands_disabled: []
#   - checkout_pr
#   - review_pr

# Deploy additional commands from local paths (relative to playbook or absolute):
ai_opencode_commands_custom: []
#   - src: ../shared-commands/deploy_staging.md
#   - src: /opt/team/audit.md
#     name: security_audit.md    # optional: override deployed filename

# OpenCode skills
# Built-in skills from files/skills/ are auto-discovered and deployed.
# Disable specific built-ins by name (directory name):
ai_opencode_skills_disabled: []
#   - some-built-in-skill

# Deploy additional skills from local paths (relative to playbook or absolute):
ai_opencode_skills_custom: []
#   - src: ../shared-skills/deploy-workflow
#   - src: /opt/team/review-skill
#     name: team-review          # optional: override deployed directory name

# Where to deploy user-level skills:
#   "agent-neutral"  => ~/.agents/skills/  (works with any AI agent)
#   "opencode"       => ~/.config/opencode/skills/  (OpenCode only)
ai_skills_target: agent-neutral

# Cursor IDE installation (disabled by default)
# Version: "latest" to track the newest release, or a major.minor version
# (e.g., "3.0") to pin. The full version is resolved from the Cursor API.
ai_cursor_version: latest
# Install method: "auto" detects from OS family (RedHat->rpm, Debian->deb,
# other->appimage). Override with "rpm", "deb", or "appimage".
ai_cursor_install_method: auto
# Directory for AppImage binary (only used when install method is appimage)
ai_cursor_appimage_dir: "{{ ai_user_home_dir }}/.local/bin"

# Cleanup (used by cleanup_opencode task, disabled by default in ai_tasks)
# Remove specific commands/skills from the target host by name.
ai_opencode_commands_cleanup: []
#   - old_command.md
ai_opencode_skills_cleanup: []
#   - deprecated-skill
