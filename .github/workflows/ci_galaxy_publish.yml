# Publish role to Ansible Galaxy on push to main.
# Requires GALAXY_API_KEY secret configured in the repository settings.
---
name: Publish to Ansible Galaxy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  galaxy-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install ansible-core
        run: pip install ansible-core==2.17.8

      - name: Import role to Galaxy
        run: >-
          ansible-galaxy role import
          --token "${{ secrets.GALAXY_API_KEY }}"
          "${{ github.repository_owner }}"
          "${{ github.event.repository.name }}"
