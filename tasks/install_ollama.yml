---
# Resolve install method: auto-detect from OS family or use explicit override
- name: "{{ role_name }} | {{ task.name }} | Resolve install method"
  ansible.builtin.set_fact:
    _ollama_resolved_method: >-
      {{ (ai_ollama_install_method == 'auto')
         | ternary(_ollama_method_map[ansible_facts['os_family']] | default('script'),
                   ai_ollama_install_method) }}

- name: "{{ role_name }} | {{ task.name }} | Resolve binary path"
  ansible.builtin.set_fact:
    _ollama_bin_path: "{{ _ollama_bin_map[_ollama_resolved_method | trim] }}"

# Check if Ollama is already installed (handles both /usr/bin and /usr/local/bin)
- name: "{{ role_name }} | {{ task.name }} | Check if Ollama is already installed"
  ansible.builtin.command:
    cmd: which ollama
  register: _ollama_which
  changed_when: false
  failed_when: false

- name: "{{ role_name }} | {{ task.name }} | Report install method"
  ansible.builtin.debug:
    msg: "Ollama install method: {{ _ollama_resolved_method | trim }} (binary: {{ _ollama_bin_path }}, already installed: {{ _ollama_which.rc == 0 }})"

# Method: package (native OS package manager)
- name: "{{ role_name }} | {{ task.name }} | Install Ollama via native package manager"
  become: true
  ansible.builtin.package:
    name: ollama
    state: present
  when:
    - _ollama_resolved_method | trim == 'package'
    - _ollama_which.rc != 0

# Method: script (official install script fallback -- creates user, unit, and binary)
- name: "{{ role_name }} | {{ task.name }} | Install Ollama via official install script"
  when:
    - _ollama_resolved_method | trim == 'script'
    - _ollama_which.rc != 0
  block:
    - name: "{{ role_name }} | {{ task.name }} | Download Ollama install script"
      ansible.builtin.get_url:
        url: https://ollama.com/install.sh
        dest: /tmp/ollama-install.sh
        mode: "0755"

    - name: "{{ role_name }} | {{ task.name }} | Run Ollama install script"
      become: true
      ansible.builtin.command:
        cmd: /tmp/ollama-install.sh
      register: _ollama_script_result
      changed_when: _ollama_script_result.rc == 0

    - name: "{{ role_name }} | {{ task.name }} | Clean up install script"
      ansible.builtin.file:
        path: /tmp/ollama-install.sh
        state: absent

# Ensure the ollama system user and group exist.
# The install script creates these, but native packages may not.
- name: "{{ role_name }} | {{ task.name }} | Ensure ollama system group exists"
  become: true
  ansible.builtin.group:
    name: ollama
    system: true
    state: present

- name: "{{ role_name }} | {{ task.name }} | Ensure ollama system user exists"
  become: true
  ansible.builtin.user:
    name: ollama
    group: ollama
    system: true
    shell: /bin/false
    home: /usr/share/ollama
    create_home: true
    state: present

# Deploy the systemd service unit if one does not exist.
# The install script creates its own; the package method typically does not.
- name: "{{ role_name }} | {{ task.name }} | Check if systemd unit exists"
  ansible.builtin.stat:
    path: /etc/systemd/system/ollama.service
  register: _ollama_unit_etc

- name: "{{ role_name }} | {{ task.name }} | Check if package-provided systemd unit exists"
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/ollama.service
  register: _ollama_unit_lib

- name: "{{ role_name }} | {{ task.name }} | Deploy Ollama systemd service unit"
  become: true
  ansible.builtin.template:
    src: ollama.service.j2
    dest: /etc/systemd/system/ollama.service
    owner: root
    group: root
    mode: "0644"
  when:
    - not _ollama_unit_etc.stat.exists
    - not _ollama_unit_lib.stat.exists

# Manage the Ollama systemd service
- name: "{{ role_name }} | {{ task.name }} | Manage Ollama systemd service"
  become: true
  ansible.builtin.systemd_service:
    name: ollama
    state: "{{ ai_ollama_service_state }}"
    enabled: "{{ ai_ollama_service_enabled }}"
    daemon_reload: true
