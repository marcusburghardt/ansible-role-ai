---
# Skip model pulls when the user configured the service to be stopped.
# If ai_ollama_service_state is 'started', install_ollama already started
# the service in the preceding task -- no need to re-check system state.
- name: "{{ role_name }} | {{ task.name }} | Skip model pulls when service is stopped"
  ansible.builtin.debug:
    msg: >-
      Ollama service state is '{{ ai_ollama_service_state }}'. Skipping model pulls.
      Set ai_ollama_service_state to 'started' to enable model pulling.
  when: ai_ollama_service_state != 'started'

# Pull enabled models from the curated list
- name: "{{ role_name }} | {{ task.name }} | Pull enabled Ollama models"
  ansible.builtin.command:
    cmd: "ollama pull {{ item.name }}"
  loop: "{{ ai_ollama_models | selectattr('enabled') | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: _ollama_pull_result
  changed_when: "'pulling' in _ollama_pull_result.stderr | default('')"
  when: ai_ollama_service_state == 'started'
