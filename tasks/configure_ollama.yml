---
# Check if the Ollama service is running before attempting model pulls
- name: "{{ role_name }} | {{ task.name }} | Gather service facts"
  ansible.builtin.service_facts:

- name: "{{ role_name }} | {{ task.name }} | Determine Ollama service state"
  ansible.builtin.set_fact:
    _ollama_service_running: >-
      {{ ansible_facts.services['ollama.service'] is defined
         and ansible_facts.services['ollama.service'].state == 'running' }}

- name: "{{ role_name }} | {{ task.name }} | Skip model pulls when service is not running"
  ansible.builtin.debug:
    msg: >-
      Ollama service is not running. Skipping model pulls. Start the service or
      set ai_ollama_service_state to 'started' to enable model pulling.
  when: not _ollama_service_running | bool

# Pull enabled models from the curated list
- name: "{{ role_name }} | {{ task.name }} | Pull enabled Ollama models"
  ansible.builtin.command:
    cmd: "ollama pull {{ item.name }}"
  loop: "{{ ai_ollama_models | selectattr('enabled') | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: _ollama_pull_result
  changed_when: "'pulling' in _ollama_pull_result.stderr | default('')"
  when: _ollama_service_running | bool
