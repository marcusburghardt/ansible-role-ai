---
# Ensure the Ollama server is responding before pulling models.
# It may be running via systemd, or we start it manually if needed.
- name: "{{ role_name }} | {{ task.name }} | Check if Ollama server is responding"
  ansible.builtin.command:
    cmd: ollama list
  register: _ollama_server_check
  changed_when: false
  failed_when: false

- name: "{{ role_name }} | {{ task.name }} | Start Ollama server for model pulling"
  ansible.builtin.shell:
    cmd: "nohup ollama serve > /dev/null 2>&1 &"
  when: _ollama_server_check.rc != 0
  changed_when: true

- name: "{{ role_name }} | {{ task.name }} | Wait for Ollama server to be ready"
  ansible.builtin.command:
    cmd: ollama list
  register: _ollama_ready
  until: _ollama_ready.rc == 0
  retries: 10
  delay: 2
  changed_when: false
  when: _ollama_server_check.rc != 0

# Pull enabled models from the curated list
- name: "{{ role_name }} | {{ task.name }} | Pull enabled Ollama models"
  ansible.builtin.command:
    cmd: "ollama pull {{ item.name }}"
  loop: "{{ ai_ollama_models | selectattr('enabled') | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: _ollama_pull_result
  changed_when: "'pulling' in _ollama_pull_result.stderr | default('')"
