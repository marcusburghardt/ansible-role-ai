---
# vars file for install_ollama task

# Maps OS family to preferred install method.
# Families not listed here fall back to 'script' (official install script).
_ollama_method_map:
  RedHat: package
  Debian: package

# Maps install method to expected binary path.
_ollama_bin_map:
  package: /usr/bin/ollama
  script: /usr/local/bin/ollama
